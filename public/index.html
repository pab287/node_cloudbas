<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZK Attendance Monitor</title>

  <script src="/socket.io/socket.io.js"></script>
  <script defer src="zkFailover.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h2 {
      margin-bottom: 16px;
    }

    /* 🔲 GRID = col-md-4 behavior */
    #attendance-list.attendance-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    /* 🧾 CARD */
    .card {
      display: flex;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, background-color .6s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .card.highlight {
      background-color: #fff9c4;
    }

    /* LEFT PANE (IMAGE) */
    .card-left {
      width: 90px;
      background: #eef1f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-left img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* RIGHT PANE */
    .card-right {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-main {
      margin-bottom: 8px;
    }

    .username {
      font-size: 16px;
      font-weight: bold;
    }

    .userid {
      font-size: 13px;
      color: #555;
    }

    .datetime {
      font-size: 13px;
      color: #333;
      margin-top: 4px;
    }

    /* BOTTOM PANE */
    .card-footer {
      font-size: 12px;
      color: #666;
      border-top: 1px solid #eee;
      padding-top: 6px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    /* 📱 MOBILE TWEAK */
    @media (max-width: 576px) {
      .card {
        flex-direction: column;
      }

      .card-left {
        width: 100%;
        height: 80px;
      }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    #deviceStatusContainer {
      white-space: normal;
    }

    /* DEVICE CARD */
    .device-card {
      display: inline-flex;
      width: 220px;
      margin: 6px;
      vertical-align: top;

      background: #fff;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      overflow: hidden;

      transition: transform .15s ease, background .3s ease;
    }

    .device-card:hover {
      transform: translateY(-2px);
    }

    /* LEFT ICON */
    .device-card-left {
      width: 60px;
      /* background: #eef1f5; */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .device-card-left i {
      font-size: 22px;
      opacity: 0.9;
    }

    .device-card-left.bg-secondary {
      background: #eef1f5;
    }
    .device-card-left.bg-success {
      background: #d1e7dd;
    }
    .device-card-left.bg-warning {
      background: #fff3cd;
    }
    .device-card-left.bg-muted {
      background: #f1f1f1;
    }

    /* RIGHT CONTENT */
    .device-card-right {
      flex: 1;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .device-name {
      font-size: 14px;
      font-weight: bold;
    }

    .device-status {
      font-size: 12px;
      margin-top: 2px;
      display: block;
    }

    /* STATUS COLORS */

    .status-online {
      color: #4caf50;
    }

    .status-reconnecting {
      color: #ff9800;
    }

    .status-error {
      color: #9c27b0;
    }

    /* OFFLINE MUTED CARD */
    .device-offline-card {
      background: #f1f1f1;
      opacity: 0.7;
    }

    /* ONLINE PULSE */
    .device-status::before {
      content: "● ";
      font-size: 10px;
      color: #4caf50;
      animation: pulse 1.4s infinite;
    }

    .status-reconnecting::before {
      color: #ff9800;
    }

    .status-error::before {
      color: #9c27b0;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="header">
  <h2 class="text-uppercase">Biometric Device Logs</h2>
  <div id="device-status"></div>
</div>
  <!-- GRID CONTAINER -->
  <ul id="attendance-list" class="attendance-grid"></ul>
</body>
</html>
