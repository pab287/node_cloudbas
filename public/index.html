<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZK Attendance Monitor</title>

  <script src="/socket.io/socket.io.js"></script>
  <script defer src="zkFailover.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h2 {
      margin-bottom: 16px;
    }

    /* 🔲 GRID = col-md-4 behavior */
    #attendance-list.attendance-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    /* 🧾 CARD */
    .card {
      display: flex;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, background-color .6s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .card.highlight {
      background-color: #fff9c4;
    }

    /* LEFT PANE (IMAGE) */
    .card-left {
      width: 90px;
      background: #eef1f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-left img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* RIGHT PANE */
    .card-right {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-main {
      margin-bottom: 8px;
    }

    .username {
      font-size: 16px;
      font-weight: bold;
    }

    .userid {
      font-size: 13px;
      color: #555;
    }

    .datetime {
      font-size: 13px;
      color: #333;
      margin-top: 4px;
    }

    /* BOTTOM PANE */
    .card-footer {
      font-size: 12px;
      color: #666;
      border-top: 1px solid #eee;
      padding-top: 6px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    /* 📱 MOBILE TWEAK */
    @media (max-width: 576px) {
      .card {
        flex-direction: column;
      }

      .card-left {
        width: 100%;
        height: 80px;
      }
    }
  </style>
</head>

<body>
  <h2>Attendance Logs</h2>

  <!-- GRID CONTAINER -->
  <ul id="attendance-list" class="attendance-grid"></ul>
</body>
</html>
