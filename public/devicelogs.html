<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Table</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />

<!-- jQuery UI CSS for Datepicker -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<script src="/attendancelogs.js"></script>
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h3 class="mb-0">Device Attendance Logs - Bata Office</h3>
      
        <a href="/" class="btn btn-outline-primary">
          <i class="bi bi-arrow-left"></i> Device Logs
        </a>
      </div>

    <div class="row mb-3 align-items-end">
        <div class="col-md-2">
            <label for="startDate" class="form-label">From Date</label>
            <input type="text" id="startDate" class="form-control" placeholder="YYYY-MM-DD" readonly>
        </div>
        <div class="col-md-2">
            <label for="endDate" class="form-label">To Date</label>
            <input type="text" id="endDate" class="form-control" placeholder="YYYY-MM-DD" readonly>
        </div>
        <div class="col-md-8 d-flex justify-content-end gap-2">
            <button id="filterBtn" class="btn btn-primary">Filter</button>
            <button id="resetBtn" class="btn btn-secondary">Reset</button>
        </div>
    </div>

    <table id="attendanceTable" class="table table-bordered">
        <colgroup>
            <col width="12%">
            <col width="8%">
            <col width="*">
            <col width="10%">
            <col width="10%">
            <col width="18%">
            <col width="16%">
        </colgroup>
        <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Biometric #</th>
                <th>Employee Name</th>
                <th>Time</th>
                <th>Punch IO</th>
                <th>Device</th>
                <th>Date & Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- jQuery -->
<script src="/assets/js/jquery-3.7.1.min.js"></script>

<!-- jQuery UI for Datepicker -->
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
    // Initialize jQuery Datepickers and disable future dates
    const today = new Date();
    const oneMonthAgo = new Date();
    oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);

    // Initialize startDate
    $("#startDate").datepicker({
        dateFormat: "yy/mm/dd",
        minDate: oneMonthAgo,
        maxDate: today,
        onSelect: function(selectedDate) {
            // Enable endDate when startDate is selected
            $("#endDate").prop("disabled", false);

            // Set minDate for endDate to selected startDate
            const start = $(this).datepicker("getDate");
            $("#endDate").datepicker("option", "minDate", start);
        }
    });

    // Initialize endDate as disabled initially
    $("#endDate").datepicker({
        dateFormat: "yy/mm/dd",
        minDate: oneMonthAgo,
        maxDate: today
    }).prop("disabled", true);

    const dtTable = $('#attendanceTable').DataTable({
        lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "All"]],
        pageLength: 10,
        ordering: false,
        columns: [
            { data: 'temp_date'},  // hidden group column
            { data: 'biometricno', className: "text-center" },
            { data: 'employee_name',render: function(data, _type, row){
                return data ?? row.biometricno;
            } },
            { data: 'formatted_time', className: "text-center" },
            { 
                data: 'verify_method', className: "text-center",
                render: function(data){
                    switch(data){
                        case 1: return 'PUNCH OUT';
                        case 4: return 'PUNCH OT-IN';
                        case 5: return 'PUNCH OT-OUT';
                        default: return 'PUNCH IN';
                    }
                }
            },
            { data: 'device_name' },
            { data: 'formatted_date', className: "text-center" }
        ],
        drawCallback: function () {
            const api = this.api();
            const rows = api.rows({ page: "current" }).nodes();
            const data = api.rows({ page: "current" }).data();

            let lastGroup = null;

            api.column(0, { page: "current" }).data().each(function (dateKey, i) {
                const row = data[i];
                const bioKey = row.biometricno;
                const empName = row.employee_name ?? bioKey;
                const groupKey = `${dateKey}-${bioKey}`;

                if (lastGroup !== groupKey) {
                    $(rows).eq(i).before(`
                        <tr class="group">
                            <td colspan="7" class="bg-light fw-bold text-success">
                                📅 ${dateKey} &nbsp;&nbsp; 🆔 ${bioKey} &nbsp;&nbsp; 👤 ${empName}
                            </td>
                        </tr>
                    `);
                    lastGroup = groupKey;
                }
            });
        }
    });

    dtTable.on('init.dt', function () {
        dtTable.draw(false);
    });

    // Load data
    loadAttendanceLogs().then(data => {
        dtTable.clear();
        dtTable.rows.add(data);
        dtTable.draw(false);
    });

    // Date filter button
    $('#filterBtn').on('click', function() {
        const startDate = $('#startDate').val();
        const endDate = $('#endDate').val();

        $.fn.dataTable.ext.search = []; // reset previous filters

        if (startDate && endDate) {
            $.fn.dataTable.ext.search.push(function(settings, data) {
                const rowDate = data[0]; // temp_date column
                return rowDate >= startDate && rowDate <= endDate;
            });
        }

        dtTable.draw();
    });

    // Reset filter button
    $('#resetBtn').on('click', function() {
        $('#startDate, #endDate').val('');  // clear datepickers
        $('#endDate').prop('disabled', true);
        $.fn.dataTable.ext.search = [];    // remove filters
        dtTable.page.len(10).page(0).draw(); // redraw table
    });
});
</script>

</body>
</html>
